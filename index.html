<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Travel Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏗 Smart Travel Planner</h1>
    </header>

    <main>
        <!-- User Input Form -->
        <section class="form-section">
            <h2>Plan Your Trip</h2>
            <form id="travelForm">
                <label>
                    Destination:
                    <input type="text" id="destination" required>
                </label>
                <label>
                    Number of Days:
                    <input type="number" id="days" min="1" required>
                </label>
                <label>
                    Budget (₹):
                    <input type="number" id="budget" min="100" required>
                </label>
                <label>
                    Number of Travelers:
                    <input type="number" id="travelers" min="1" value="1" required>
                </label>
                <label>
                    Travel Type:
                    <select id="travelType">
                        <option value="solo">Solo</option>
                        <option value="family">Family</option>
                        <option value="friends">Friends</option>
                    </select>
                </label>
                <label>
                    <input type="checkbox" id="needHotel">
                    Need Hotel?
                </label>
                <button type="submit">Generate Plan</button>
            </form>
        </section>

        <!-- Dynamic Travel Plan Section -->
        <section class="plan-section">
            <h2>Your Smart Itinerary</h2>
            <div id="planContainer" class="plan-container">
                <!-- Generated itinerary cards will appear here -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
